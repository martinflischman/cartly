<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cartly</title>
    <meta name="description" content="A simple shopping cart application" />
    
    <!-- Favicon -->
    <link rel="shortcut icon" href="/favicon.ico" type="image/x-icon" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="manifest" href="/site.webmanifest" />
    
    <!-- Fonts: Poppins for app name, Inter for rest, Roboto Mono for list -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@300;400;500;600&family=Roboto+Mono:wght@400;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet" />
    
    <!-- Styles -->
    <link rel="stylesheet" href="/src/styles/main.css" />
    <style>
      body { font-family: 'Inter', sans-serif; }
      .cartly-title { font-family: 'Poppins', sans-serif; }
      .shopping-list-mono { font-family: 'Roboto Mono', monospace; }
    </style>
  </head>

  <body class="bg-surface-dark min-h-screen flex items-center justify-center">
    <button id="user-menu-btn" class="fixed top-4 right-4 z-50 bg-white rounded-full shadow flex items-center justify-center focus:outline-none" style="width:40px;height:40px; display:none;">
      <div id="user-avatar">account_circle</div>
    </button>
    <div id="user-menu-dropdown" class="hidden fixed top-16 right-4 z-50 bg-white rounded-lg shadow-lg p-4 min-w-[180px] border border-gray-100"></div>
    <main class="container flex flex-col items-center w-full max-w-md px-4 flex-1">
      <img 
        src="/src/assets/images/cat.webp" 
        alt="Shopping cart illustration" 
        class="main-illustration"
      />
      <div class="w-full flex flex-col gap-3 mt-2">
        <div class="flex flex-col gap-3 w-full">
          <input
            type="text"
            id="input-field"
            class="input-field"
            placeholder="Add an item here..."
            aria-label="Item name"
          />
          
          <button
            id="add-button"
            class="add-button"
            aria-label="Add item to cart"
          >
            <span class="material-icons mr-2">add_shopping_cart</span>
            Add to Cartly
          </button>
        </div>
        
        <ul
          id="shopping-list"
          class="shopping-list shopping-list-mono min-h-[40px]"
          role="list"
          aria-label="Shopping cart items"
        ></ul>
      </div>
    </main>
    <script type="module" src="/src/js/app.ts"></script>
  </body>
</html>
